name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite is only available un-flagged from Node 24, so 24 LTS is the floor.
        node: [24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      # Web app (its own project + lockfile)
      - run: npm --prefix webapp ci
      - run: npm --prefix webapp run lint
      - run: npm --prefix webapp run test
      - run: npm run build:webapp

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # Packs the plugin and loads it into a real Signal K server to verify it installs + registers.
  signalk-integration:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
