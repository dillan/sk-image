name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: write # dispatch signalk-ci.yml at the release tag (for the App Store CI indicator)

jobs:
  release:
    # Dormant until the repo variable RELEASE_ENABLED is set to 'true'. The chore(release) guard
    # stops semantic-release's own version-bump commit from re-triggering a release.
    if: vars.RELEASE_ENABLED == 'true' && !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      # semantic-release pushes the "chore(release)" version-bump commit directly to main, which the
      # branch ruleset rejects for the built-in GITHUB_TOKEN (it can't be a ruleset bypass actor).
      # Mint a token from a GitHub App that IS on the ruleset's bypass list and push as that.
      - name: Generate a release token from the GitHub App
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm OIDC trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npx semantic-release
        env:
          # The App token (bypasses the ruleset) for the git push + GitHub Release/comments. npm
          # publishing still uses OIDC (id-token), not this token.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'
      # A published release tags the release commit — the exact commit npm records as `gitHead`.
      # Dispatch the SignalK plugin-ci workflow at that tag so a plugin-ci run exists on that commit;
      # the App Store registry looks there for a run referencing plugin-ci.yml, and the `[skip ci]`
      # release commit gets no push-triggered run of its own. workflow_dispatch is the documented
      # exception that DOES fire under GITHUB_TOKEN. No-op when this push produced no release.
      - name: Trigger plugin-ci on the release commit
        run: |
          TAG="$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -n1)"
          if [ -n "$TAG" ]; then
            echo "Released $TAG — dispatching signalk-ci.yml at $TAG"
            gh workflow run signalk-ci.yml --ref "$TAG"
          else
            echo "No release tag on HEAD — nothing to dispatch."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
