name: SignalK Plugin CI

# Calls SignalK's reusable plugin-ci workflow (matches the canonical caller example). It packs the
# plugin and loads it into a real Signal K server across platforms to verify it installs + registers.
#
# It runs on pushes/PRs to main for coverage, AND is dispatched by release.yml at each release tag
# (workflow_dispatch). The release-tag dispatch is what makes the App Store happy: the registry looks
# for a run referencing plugin-ci.yml on the exact commit npm records as `gitHead`. Our release commit
# carries `[skip ci]` and is pushed by GITHUB_TOKEN, so no push-triggered run lands on it — the
# dispatched run does. Without it the registry reports `no-plugin-ci` and docks the score 10 points.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Tested on Node 22 and 24: the plugin uses the built-in `node:sqlite`, which is un-flagged from
  # Node 22.13 (v22.13.0, PR #55890), so it targets Node 22.13+ and 24.
  #
  # The reusable workflow's armv7 (Cerbo GX) leg is DISABLED (enable-armv7: false): it runs on Node 20
  # (Venus OS's version), which the plugin no longer targets — Node 20 lacks node:sqlite (added in 22.5),
  # and Kip, a primary integration target for sk-image, has also dropped Node 20. Modern 64-bit servers
  # (arm64 / x64) are covered by the Linux and arm64 legs.
  plugin-ci:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
    with:
      node-versions: '["22", "24"]'
      # armv7 (Cerbo GX) is pinned to Node 20 in the reusable workflow, which we no longer target.
      enable-armv7: false
      # Run the live integration test (start a real Signal K server, install the plugin, verify it
      # loads/registers) on Node 22 and 24 against signalk-server@latest, instead of leaving it skipped.
      enable-signalk-integration: true
