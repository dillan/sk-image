name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite is un-flagged from Node 22.13, so 22.13+ is the floor; test 22 and 24 LTS.
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      # Web app (its own project + lockfile)
      - run: npm --prefix webapp ci
      - run: npm --prefix webapp run lint
      - run: npm --prefix webapp run test
      - run: npm run build:webapp

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # The Signal K reusable plugin-ci (packs + installs into a real server across platforms) lives in
  # its own workflow, .github/workflows/signalk-ci.yml, so release.yml can dispatch it at the release
  # tag for the App Store CI indicator.
